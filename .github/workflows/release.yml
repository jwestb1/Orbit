name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      # HACS installs the Integration and Plugin halves of this repo from
      # the same tag, so custom_components/orbit's manifest.json must be
      # kept in lockstep with the tag being released — catch drift here
      # rather than shipping an Integration install stuck on a stale version.
      - name: Verify custom_components/orbit manifest version matches tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version=$(node -p "require('./custom_components/orbit/manifest.json').version")
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "::error::Tag v$tag_version does not match custom_components/orbit/manifest.json version $manifest_version"
            exit 1
          fi
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/orbit-remote-card.js
          generate_release_notes: true

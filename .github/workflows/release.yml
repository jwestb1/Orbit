name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: "npm"
      # HACS installs the Integration and Plugin halves of this repo from
      # the same tag, so both custom_components/orbit's manifest.json and
      # package.json must be kept in lockstep with the tag being released —
      # catch drift here rather than shipping a stale/half-built release.
      - name: Verify version files match tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version=$(node -p "require('./custom_components/orbit/manifest.json').version")
          package_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "::error::Tag v$tag_version does not match custom_components/orbit/manifest.json version $manifest_version"
            exit 1
          fi
          if [ "$tag_version" != "$package_version" ]; then
            echo "::error::Tag v$tag_version does not match package.json version $package_version"
            exit 1
          fi
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/orbit-remote-card.js
          generate_release_notes: true

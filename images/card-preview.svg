<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1c1e"/>
      <stop offset="1" stop-color="#141416"/>
    </linearGradient>
  </defs>

  <!-- card background -->
  <rect x="0" y="0" width="640" height="420" rx="16" fill="url(#bg)"/>

  <!-- title -->
  <text x="24" y="38" fill="#e3e3e6" font-size="18" font-weight="600">Living Room Shield</text>
  <circle cx="600" cy="32" r="6" fill="#4caf50"/>

  <!-- trackpad -->
  <rect x="24" y="60" width="260" height="180" rx="14" fill="#2a2a2d" stroke="#3a3a3e" stroke-width="1"/>
  <text x="154" y="155" fill="#6b6b70" font-size="13" text-anchor="middle">Trackpad</text>
  <circle cx="120" cy="120" r="4" fill="#5b8def" opacity="0.7"/>

  <!-- d-pad cluster -->
  <g transform="translate(370,60)">
    <rect x="0" y="0" width="180" height="180" rx="14" fill="#2a2a2d" stroke="#3a3a3e" stroke-width="1"/>
    <circle cx="90" cy="90" r="34" fill="#38383c"/>
    <text x="90" y="95" fill="#e3e3e6" font-size="12" text-anchor="middle">OK</text>
    <path d="M90 20 L104 44 L76 44 Z" fill="#5b8def"/>
    <path d="M90 160 L104 136 L76 136 Z" fill="#5b8def"/>
    <path d="M20 90 L44 76 L44 104 Z" fill="#5b8def"/>
    <path d="M160 90 L136 76 L136 104 Z" fill="#5b8def"/>
  </g>

  <!-- button row: power / home / back -->
  <g transform="translate(24,254)">
    <circle cx="20" cy="20" r="20" fill="#2a2a2d" stroke="#3a3a3e"/>
    <path d="M20 10 v10 M13 13 a10 10 0 1 0 14 0" stroke="#e2574c" stroke-width="2" fill="none" stroke-linecap="round"/>

    <circle cx="70" cy="20" r="20" fill="#2a2a2d" stroke="#3a3a3e"/>
    <path d="M60 22 L70 12 L80 22 M63 20 v10 h14 v-10" stroke="#e3e3e6" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

    <circle cx="120" cy="20" r="20" fill="#2a2a2d" stroke="#3a3a3e"/>
    <path d="M126 10 l-10 10 l10 10" stroke="#e3e3e6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- volume slider -->
  <g transform="translate(200,254)">
    <rect x="0" y="14" width="150" height="12" rx="6" fill="#2a2a2d"/>
    <rect x="0" y="14" width="95" height="12" rx="6" fill="#5b8def"/>
    <circle cx="95" cy="20" r="9" fill="#e3e3e6"/>
  </g>

  <!-- app shortcut grid -->
  <g transform="translate(24,320)">
    <text x="0" y="0" fill="#6b6b70" font-size="12">Apps</text>
    <g transform="translate(0,14)">
      <rect x="0" y="0" width="56" height="56" rx="12" fill="#2a2a2d"/>
      <circle cx="28" cy="28" r="14" fill="#e2574c"/>
      <rect x="70" y="0" width="56" height="56" rx="12" fill="#2a2a2d"/>
      <circle cx="98" cy="28" r="14" fill="#5b8def"/>
      <rect x="140" y="0" width="56" height="56" rx="12" fill="#2a2a2d"/>
      <circle cx="168" cy="28" r="14" fill="#4caf50"/>
      <rect x="210" y="0" width="56" height="56" rx="12" fill="#2a2a2d"/>
      <circle cx="238" cy="28" r="14" fill="#f5a623"/>
      <rect x="280" y="0" width="56" height="56" rx="12" fill="#2a2a2d"/>
      <circle cx="308" cy="28" r="14" fill="#9b59b6"/>
      <rect x="350" y="0" width="56" height="56" rx="12" fill="#2a2a2d"/>
      <circle cx="378" cy="28" r="14" fill="#20c997"/>
      <rect x="420" y="0" width="56" height="56" rx="12" fill="#2a2a2d"/>
      <circle cx="448" cy="28" r="14" fill="#607d8b"/>
      <rect x="490" y="0" width="56" height="56" rx="12" fill="#38383c" stroke="#4a4a4e" stroke-dasharray="4 3"/>
      <text x="518" y="33" fill="#6b6b70" font-size="20" text-anchor="middle">+</text>
    </g>
  </g>
</svg>
